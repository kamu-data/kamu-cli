kind: DatasetSnapshot
version: 1
content:
  name: ca.bankofcanada.exchange-rates.daily
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Url
        url: https://www.bankofcanada.ca/valet/observations/group/FX_RATES_DAILY/csv?start_date=2017-01-03
      prepare:
        - kind: Pipe
          command:
            - sed
            - -e
            - 1,/OBSERVATIONS/d
      read:
        kind: Csv
        header: true
        # TODO: Use DECIMAL type
        schema:
          fields:
            - { name: date, type: timestamp }
            - { name: FXAUDCAD, type: float64 }
            - { name: FXBRLCAD, type: float64 }
            - { name: FXCNYCAD, type: float64 }
            - { name: FXEURCAD, type: float64 }
            - { name: FXHKDCAD, type: float64 }
            - { name: FXINRCAD, type: float64 }
            - { name: FXIDRCAD, type: float64 }
            - { name: FXJPYCAD, type: float64 }
            - { name: FXMYRCAD, type: float64 }
            - { name: FXMXNCAD, type: float64 }
            - { name: FXNZDCAD, type: float64 }
            - { name: FXNOKCAD, type: float64 }
            - { name: FXPENCAD, type: float64 }
            - { name: FXPLNCAD, type: float64 }
            - { name: FXRUBCAD, type: float64 }
            - { name: FXSARCAD, type: float64 }
            - { name: FXSGDCAD, type: float64 }
            - { name: FXZARCAD, type: float64 }
            - { name: FXKRWCAD, type: float64 }
            - { name: FXSEKCAD, type: float64 }
            - { name: FXCHFCAD, type: float64 }
            - { name: FXTWDCAD, type: float64 }
            - { name: FXTHBCAD, type: float64 }
            - { name: FXTRYCAD, type: float64 }
            - { name: FXGBPCAD, type: float64 }
            - { name: FXUSDCAD, type: float64 }
            - { name: FXVNDCAD, type: float64 }
      merge:
        kind: Ledger
        primaryKey:
          - date
      preprocess:
        kind: Sql
        engine: datafusion
        query: |
          select
            date,
            'USD' as currency_base,
            'CAD' as currency_target,
            FXUSDCAD as rate
          from input
    - kind: SetVocab
      eventTimeColumn: date
