kind: DatasetSnapshot
version: 1
content:
  name: com.acme.orders
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: FilesGlob
        path: data/orders-*.csv
      read:
        kind: Csv
        header: true
        schema:
          fields:
            - name: event_time
              type: timestamp
            - name: order_id
              type: int64
            - name: quantity
              type: int64
      merge:
        kind: Ledger
        primaryKey:
          - order_id
