version: 1
kind: DatasetSnapshot
content:
  name: my.trading.transactions
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: FilesGlob
        path: data/transactions.csv
      read:
        kind: Csv
        header: true
        schema:
          fields:
            - name: event_time
              type: timestamp
            - name: symbol
              type: string
            - name: quantity
              type: int64
            - name: price
              type: float64
            - name: settlement
              type: float64
      merge:
        kind: Ledger
        primaryKey:
          - event_time
