kind: DatasetSnapshot
version: 1
content:
  name: com.yahoo.finance.tickers.daily
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: FilesGlob
        path: data/tickers.csv
      read:
        kind: Csv
        header: true
        schema:
          fields:
            - name: Date
              type: timestamp
            - name: Symbol
              type: string
            - name: AdjClose
              type: float64
            - name: Close
              type: float64
            - name: High
              type: float64
            - name: Low
              type: float64
            - name: Open
              type: float64
            - name: Volume
              type: float64
      preprocess:
        kind: Sql
        engine: datafusion
        query: |
          SELECT
            Date as event_time,
            Symbol as symbol,
            AdjClose as close_adj,
            Close as close,
            High as high,
            Low as low,
            Open as open,
            Volume as volume
          FROM input
      merge:
        kind: Ledger
        primaryKey:
          - event_time
          - symbol
