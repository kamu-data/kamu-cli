kind: DatasetSnapshot
version: 1
content:
  name: temp
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: mqtt
        host: test.mosquitto.org
        port: 1883
        topics:
          - path: dev.kamu.example.mqtt.temp
            qos: AtMostOnce
      read:
        kind: NdJson
        schema:
          fields:
            - name: event_time
              type: timestamp
            - name: value
              type: float32
      merge:
        kind: Ledger
        primaryKey:
          - event_time
