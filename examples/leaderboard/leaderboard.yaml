kind: DatasetSnapshot
version: 1
content:
  name: leaderboard
  kind: Derivative
  metadata:
    - kind: SetTransform
      inputs:
        - datasetRef: player-scores
          alias: player_scores
      transform:
        kind: Sql
        engine: risingwave
        query: |
          select
            *
          from (
            select
              row_number() over (partition by 1 order by score desc) as place,
              match_time,
              match_id,
              player_id,
              score
            from player_scores
          )
          where place <= 2
    - kind: SetVocab
      eventTimeColumn: match_time
