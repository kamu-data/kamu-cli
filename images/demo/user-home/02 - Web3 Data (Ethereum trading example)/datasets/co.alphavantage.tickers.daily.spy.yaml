---
kind: DatasetSnapshot
version: 1
content:
  name: co.alphavantage.tickers.daily.spy
  kind: Root
  metadata:
    - kind: SetPollingSource
      fetch:
        kind: Url
        url: "https://www.alphavantage.co/query\
          ?function=TIME_SERIES_DAILY\
          &symbol=SPY\
          &outputsize=full\
          &datatype=csv\
          &apikey=${{ env.ALPHA_VANTAGE_API_KEY }}"
      read:
        kind: Csv
        header: true
        schema:
          fields:
            - name: timestamp
              type: timestamp
            - name: open
              type: float64
            - name: high
              type: float64
            - name: low
              type: float64
            - name: close
              type: float64
            - name: volume
              type: float64
      preprocess:
        kind: Sql
        engine: datafusion
        query: |
          select
            timestamp as event_time,
            'spy' as from_symbol,
            'usd' as to_symbol,
            open,
            high,
            low,
            close,
            volume
          from input
      merge:
        kind: Ledger
        primaryKey:
          - event_time
