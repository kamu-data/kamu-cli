[package]
name = "kamu-configuration-postgres"
description = "Postgres-specific implementation of configuration projections"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false


[dependencies]
database-common = { workspace = true }
internal-error = { workspace = true }
kamu-configuration = { workspace = true, features = ["sqlx"] }
kamu-resources = { workspace = true }
odf = { workspace = true, features = ["sqlx-postgres"] }

async-trait = { version = "0.1", default-features = false }
chrono = { version = "0.4", default-features = false }
dill = { version = "0.15", default-features = false }
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "macros",
    "postgres",
    "chrono",
    "uuid",
] }
uuid = { version = "1", default-features = false, features = ["v4"] }


[dev-dependencies]
database-common-macros = { workspace = true }
kamu-accounts-postgres = { workspace = true }
kamu-configuration-repo-tests = { workspace = true }
kamu-datasets-postgres = { workspace = true }
kamu-resources-postgres = { workspace = true }

test-group = { version = "1" }
test-log = { version = "0.2", features = ["trace"] }
