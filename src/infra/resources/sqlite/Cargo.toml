[package]
name = "kamu-resources-sqlite"
description = "SQLite-specific implementation of the managed resources event store"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false


[dependencies]
database-common = { workspace = true }
event-sourcing = { workspace = true }
kamu-resources = { workspace = true, features = ["sqlx"] }
internal-error = { workspace = true }
odf = { workspace = true, features = ["sqlx-sqlite"] }

async-stream = "0.3"
async-trait = { version = "0.1", default-features = false }
chrono = { version = "0.4", default-features = false }
dill = { version = "0.15", default-features = false }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "json",
    "macros",
    "sqlite",
    "chrono",
    "uuid",
] }
uuid = { version = "1", default-features = false, features = ["v4"] }


[dev-dependencies]
