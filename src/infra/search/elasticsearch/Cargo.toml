[package]
name = "kamu-search-elasticsearch"
description = "Implementation of search capability using Elasticsearch"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false

[features]
default = []

testing = [
    "dep:chrono",
    "dep:init-on-startup",
    "dep:messaging-outbox",
    "dep:random-strings", 
    "dep:time-source",
    "dep:kamu-search-elasticsearch-macros",
    "dep:kamu-search-services"
]


[dependencies]
common-macros = { workspace = true }
container-runtime = { workspace = true }
init-on-startup = { workspace = true, optional = true }
internal-error = { workspace = true }
messaging-outbox = { workspace = true, optional = true }
random-strings = { workspace = true, optional = true}
time-source = { workspace = true, optional = true }

kamu-search = { workspace = true }
kamu-search-services = { workspace = true, optional = true }
kamu-search-elasticsearch-macros = { workspace = true, optional = true}

async-trait = { version = "0.1", default-features = false }
canonical_json = { version = "0.5", default-features = false }
chrono = { version = "0.4", default-features = false, optional = true }
dill = { version = "0.15", default-features = false }
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
hex = { version = "0.4", default-features = false }
reqwest = { version = "0.12", default-features = false, features = ["gzip", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
sha2 = { version = "0.11", default-features = false }
serde_json = { version = "1", default-features = false }
thiserror = { version = "2", default-features = false }
tokio = { version = "1", default-features = false }
tracing = { version = "0.1", default-features = false }
url = { version = "2", default-features = false }


[dev-dependencies]
indoc = "2"
pretty_assertions = { version = "1" }
test-log = { version = "0.2", features = ["trace"] }
test-group = { version = "1" }
