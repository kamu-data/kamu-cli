[package]
name = "eip-712"
publish = false
edition = "2024"


[lib]
doctest = false

[dependencies]
alloy = { version = "2", default-features = false, features = ["dyn-abi", "eip712"] }
eyre = "0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
alloy = { version = "2", default-features = false, features = [
    "signer-local",
    "signers",
] }
pretty_assertions = { version = "1", default-features = false, features = [
    "std",
    "unstable",
] }
