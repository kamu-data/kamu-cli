[package]
name = "kamu-resources-services"
description = "Service implementations of the managed resources control pane"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false


[features]
default = []
testing = ["dep:kamu-resources-inmem", "dep:kamu-messaging-outbox-inmem"]


[dependencies]
database-common = { workspace = true }
event-sourcing = { workspace = true }
internal-error = { workspace = true }
messaging-outbox = { workspace = true }
time-source = { workspace = true }
kamu-accounts = { workspace = true }
kamu-resources = { workspace = true }
kamu-resources-inmem = { workspace = true, optional = true }
kamu-messaging-outbox-inmem = { workspace = true, optional = true }
odf = { workspace = true }

async-trait = { version = "0.1", default-features = false }
chrono = { version = "0.4", default-features = false, features = ["clock"] }
dill = { version = "0.15", default-features = false }
enum-variants = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
thiserror = { version = "2", default-features = false, features = ["std"] }
tokio-stream = { version = "0.1", default-features = false }
tracing = { version = "0.1", default-features = false }
uuid = { version = "1", default-features = false }
serde_json = { version = "1.0", default-features = false }
paste = { version = "1", default-features = false }


[dev-dependencies]
kamu-resources-services       = { workspace = true, features = ["testing"] }
kamu-resources-inmem          = { workspace = true }
kamu-messaging-outbox-inmem   = { workspace = true }
database-common               = { workspace = true }
database-common-macros        = { workspace = true }
messaging-outbox              = { workspace = true }
time-source                   = { workspace = true }
event-sourcing                = { workspace = true }
odf                           = { workspace = true }
kamu-resources                = { workspace = true, features = ["testing"] }

email-utils       = { workspace = true }
mockall           = { version = "0.14", default-features = false }
oop               = "0.0.2"
test-log          = { version = "0.2", features = ["trace"] }
tokio             = { version = "1", default-features = false, features = ["rt", "macros"] }
pretty_assertions = { version = "1", default-features = false, features = ["std", "unstable"] }
