[package]
name = "kamu-resources"
description = "Domain model of the managed resources control pane"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false


[features]
default = []
sqlx = ["dep:sqlx"]
testing = ["dep:mockall"]


[dependencies]
database-common = { workspace = true }
dill = { version = "0.15", default-features = false }
enum-variants = { workspace = true }
event-sourcing = { workspace = true }
internal-error = { workspace = true }
messaging-outbox = { workspace = true }
odf = { workspace = true }

async-trait = { version = "0.1", default-features = false }
chrono = { version = "0.4", default-features = false, features = ["serde"] }
like = { version = "0.3", default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1", default-features = false }
strum = { version = "0.28", default-features = false, features = ["derive"] }
thiserror = { version = "2", default-features = false, features = ["std"] }
mockall = { version = "0.14", default-features = false, optional = true }
tokio-stream = { version = "0.1", default-features = false }
tracing = { version = "0.1", default-features = false }
url = { version = "2", default-features = false }
uuid = { version = "1", default-features = false, features = ["serde", "v4"] }

# Optional
sqlx = { optional = true, version = "0.8", default-features = false, features = [
    "macros",
] }


[dev-dependencies]
