[package]
name = "kamu-signing"
description = "Domain model of signing subsystem"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false


[features]
default = []

schemars = ["crypto-eip712-utils/schemars"]
utoipa = ["dep:utoipa", "crypto-eip712-utils/utoipa"]

[dependencies]
internal-error = { workspace = true }
crypto-eip712-utils = { workspace = true, default-features = false, features = [
    "serde"
] }
odf = { workspace = true }

async-trait = { version = "0.1", default-features = false }
bon = { version = "3", default-features = false }
serde = { version = "1", features = ["derive"], default-features = false }
thiserror = { version = "2", default-features = false }

# Optional
utoipa = { optional = true, version = "5", default-features = false, features = [] }

[dev-dependencies]
indoc = { version = "2", default-features = false }
pretty_assertions = { version = "1", default-features = false, features = ["std", "unstable"] }
