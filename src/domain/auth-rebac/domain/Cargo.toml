[package]
name = "kamu-auth-rebac"
description = "Domain model of ReBAC"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false


[features]
sqlx = ["dep:sqlx"]


[dependencies]
internal-error = { workspace = true }
messaging-outbox = { workspace = true }
kamu-accounts = { workspace = true }
kamu-datasets = { workspace = true }
odf = { workspace = true }

async-trait = "0.1"
indoc = { version = "2", default-features = false }
itertools = { version = "0.14", default-features = false }
serde = { version = "1", features = ["derive"] }
strum = { version = "0.28", features = ["derive"] }
thiserror = { version = "2", default-features = false, features = ["std"] }

# Optional
sqlx = { optional = true, version = "0.8", default-features = false, features = [
    "macros",
] }


[dev-dependencies]
pretty_assertions = { version = "1", default-features = false, features = [] }
rstest = { version = "0.26", default-features = false }
