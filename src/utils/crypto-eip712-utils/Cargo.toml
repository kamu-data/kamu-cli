[package]
name = "crypto-eip712-utils"
description = "Utility helpers for EIP-712 signing workflows"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false


[features]
default = []

schemars = ["dep:schemars"]
serde = ["dep:serde", "nutype/serde"]
utoipa = ["dep:utoipa"]

[dependencies]
internal-error = { workspace = true }

# TODO: Molecule: Phase 3: update to alloy@2 crate.
#                 Blocked by datafusion-ethers & duplicate deps
alloy = { version = "1", default-features = false, features = [
    "dyn-abi",
    "eip712",
    "signer-local",
    "signers",
] }
const-hex = { version = "1", default-features = true, features = [] }
nutype = { version = "0.7", default-features = false, features = [] }
serde_json = { version = "1", default-features = false }
zeroize = { version = "1", default-features = false, features = [] }

# Optional
schemars = { optional = true, version = "1", default-features = false, features = [] }
serde = { optional = true, version = "1", features = ["derive"], default-features = false }
utoipa = { optional = true, version = "5", default-features = false, features = [] }

[dev-dependencies]
eyre = { version = "0", default-features = false, features = [
    "auto-install",
    "track-caller",
] }
indoc = { version = "2", default-features = false }
pretty_assertions = { version = "1", default-features = false, features = [
    "std",
    "unstable",
] }
