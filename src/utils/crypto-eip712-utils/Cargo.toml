[package]
name = "crypto-eip712-utils"
description = "Utility helpers for EIP-712 signing workflows"
version = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
authors = { workspace = true }
readme = { workspace = true }
license-file = { workspace = true }
keywords = { workspace = true }
include = { workspace = true }
edition = { workspace = true }
publish = { workspace = true }


[lints]
workspace = true


[lib]
doctest = false


[features]
default = []


[dependencies]
internal-error = { workspace = true }

# TODO: Molecule: Phase 3: update to alloy@2 crate.
#                 Blocked by datafusion-ethers & duplicate deps
alloy = { version = "1", default-features = false, features = [
    "dyn-abi",
    "eip712",
    "signers",
    "signer-local",
] }
nutype = { version = "0.6", default-features = false, features = [] }
serde = { version = "1", features = ["derive"], default-features = false }
serde_json = { version = "1", default-features = false }
zeroize = { version = "1", default-features = false, features = [] }


[dev-dependencies]
eyre = { version = "0", default-features = false }
pretty_assertions = { version = "1", default-features = false, features = [
    "std",
    "unstable",
] }
