kind: DatasetSnapshot
version: 1
content:
  name: project-data-room
  kind: Root
  metadata:
  - kind: SetDataSchema
    schema:
      fields:
      - name: offset
        type:
          kind: Int64
      - name: op
        type:
          kind: Int32
      - name: system_time
        type:
          kind: Timestamp
      - name: event_time
        type:
          kind: Timestamp
      - name: path
        type:
          kind: String
        extra:
          opendatafabric.org/description: HTTP-like path to a collection entry. Paths start with `/` and can be nested, with individual path segments url-encoded (e.g. `/foo/bar%20baz`)
      - name: ref
        type:
          kind: String
        extra:
          opendatafabric.org/description: DID that references another dataset
          opendatafabric.org/type:
            kind: Did
      - name: molecule_change_by
        type:
          kind: Option
          inner:
            kind: String
      - name: molecule_access_level
        type:
          kind: Option
          inner:
            kind: String
      - name: content_type
        type:
          kind: Option
          inner:
            kind: String
      - name: content_hash
        type:
          kind: Option
          inner:
            kind: String
      - name: content_length
        type:
          kind: Option
          inner:
            kind: Int32
      - name: description
        type:
          kind: Option
          inner:
            kind: String
      - name: categories
        type:
          kind: Option
          inner:
            kind: List
            itemType:
              kind: Option
              inner:
                kind: String
      - name: tags
        type:
          kind: Option
          inner:
            kind: List
            itemType:
              kind: Option
              inner:
                kind: String
      - name: version
        type:
          kind: Option
          inner:
            kind: Int32
      extra:
        kamu.dev/archetype: Collection
  - kind: AddPushSource
    sourceName: default
    read:
      kind: NdJson
      schema:
        fields:
        - name: op
          type:
            kind: Option
            inner:
              kind: Int32
        - name: event_time
          type:
            kind: Option
            inner:
              kind: Timestamp
        - name: path
          type:
            kind: Option
            inner:
              kind: String
        - name: ref
          type:
            kind: Option
            inner:
              kind: String
        - name: molecule_change_by
          type:
            kind: Option
            inner:
              kind: String
        - name: molecule_access_level
          type:
            kind: Option
            inner:
              kind: String
        - name: content_type
          type:
            kind: Option
            inner:
              kind: String
        - name: content_hash
          type:
            kind: Option
            inner:
              kind: String
        - name: content_length
          type:
            kind: Option
            inner:
              kind: Int32
        - name: description
          type:
            kind: Option
            inner:
              kind: String
        - name: categories
          type:
            kind: Option
            inner:
              kind: List
              itemType:
                kind: Option
                inner:
                  kind: String
        - name: tags
          type:
            kind: Option
            inner:
              kind: List
              itemType:
                kind: Option
                inner:
                  kind: String
        - name: version
          type:
            kind: Option
            inner:
              kind: Int32
    merge:
      kind: ChangelogStream
      primaryKey:
      - path
