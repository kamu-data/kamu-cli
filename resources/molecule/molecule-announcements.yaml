kind: DatasetSnapshot
version: 1
content:
  name: announcements
  kind: Root
  metadata:
  - kind: SetDataSchema
    schema:
      fields:
      - name: offset
        type:
          kind: Int64
      - name: op
        type:
          kind: Int32
      - name: system_time
        type:
          kind: Timestamp
      - name: event_time
        type:
          kind: Timestamp
      - name: ocl_id
        type:
          kind: String
      - name: announcement_id
        type:
          kind: String
      - name: headline
        type:
          kind: String
      - name: body
        type:
          kind: String
      - name: attachments
        type:
          kind: List
          itemType:
            kind: String
      - name: molecule_access_level
        type:
          kind: String
      - name: molecule_change_by
        type:
          kind: String
      - name: categories
        type:
          kind: List
          itemType:
            kind: String
      - name: tags
        type:
          kind: List
          itemType:
            kind: String
  - kind: AddPushSource
    sourceName: default
    read:
      kind: NdJson
      schema:
        fields:
        - name: op
          type:
            kind: Int32
        - name: event_time
          type:
            kind: Option
            inner:
              kind: Timestamp
        - name: ocl_id
          type:
            kind: String
        - name: announcement_id
          type:
            kind: String
        - name: headline
          type:
            kind: String
        - name: body
          type:
            kind: String
        - name: attachments
          type:
            kind: List
            itemType:
              kind: Option
              inner:
                kind: String
        - name: molecule_access_level
          type:
            kind: String
        - name: molecule_change_by
          type:
            kind: String
        - name: categories
          type:
            kind: List
            itemType:
              kind: Option
              inner:
                kind: String
        - name: tags
          type:
            kind: List
            itemType:
              kind: Option
              inner:
                kind: String
    merge:
      kind: ChangelogStream
      primaryKey:
      - announcement_id
  - kind: SetInfo
    description: Projects announcements
    keywords:
    - DeSci
    - BioTech
    - Funding
    - Crypto
  - kind: SetAttachments
    attachments:
      kind: Embedded
      items:
      - path: README.md
        content: |
          # Announcements

          Dataset automatically combines announcements from individual projects.
